name: "Bootstrap"
description: "Bootstrap environment for CI jobs (delegates checkout/go/tool-cache to anchore/go-make setup)"
inputs:
  bootstrap-apt-packages:
    description: "Space delimited list of tools to install via apt"
    default: ""
  compute-fingerprints:
    description: "Compute test fixture fingerprints"
    default: "false"
runs:
  using: "composite"
  steps:
    # setup checkout, go, go-make, binny, and cache go modules + tools
    - uses: anchore/go-make/.github/actions/setup@88c36505984649108439f13fb35dcaea4ce61d94 # v0.4.0

    - name: Install apt packages
      if: inputs.bootstrap-apt-packages != ''
      shell: bash
      env:
        APT_PACKAGES: ${{ inputs.bootstrap-apt-packages }}
      run: |
        # convert space-separated string to bash array for safe handling
        read -ra packages <<< "$APT_PACKAGES"
        if [ ${#packages[@]} -gt 0 ]; then
          DEBIAN_FRONTEND=noninteractive sudo apt update && sudo -E apt install -y "${packages[@]}"
        fi

    - name: Create test fixture fingerprints
      if: inputs.compute-fingerprints == 'true'
      shell: bash
      run: |
        # used to key integration test caches in the workflow
        cd test/integration/testdata && make cache.fingerprint
